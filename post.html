<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="./src/styles/style.css" /> -->
    <title>Food Post · Thoughtful Food</title>

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>

    <site-navbar></site-navbar>

    <section class="text-dark text-center p-5">
      <div class="container">
        <h1 class="display-4 fw-bold text-body-emphasis">Create Food Option</h1>
      </div>
    </section>
    <br />
<form id="postForm">
<div class="d-flex justify-content-center align-items-center">
    <div style="width: 800px;">
      <div class="form-floating mb-3">
  <input type="text" class="form-control" id="title" placeholder="Food Name">
  <label for="title">Food Name</label>
</div>
<div class="form-floating mb-3">
  <input type="number" id="price" class="form-control" placeholder="Price" step="0.01"/>
  <label for="price">Price</label>
</div>
<div class="form-floating mb-3">
  <input type="text" class="form-control" id="location" placeholder="Location">
  <label for="location">Location</label>
</div>
<div class="form-floating mb-3">
  <textarea class="form-control" placeholder="Description here" id="description" style="height: 100px"></textarea>
  <label for="description">Description</label>
</div>
<div class="form-floating">
  <p class="h5">Dietary Tags</p>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="veg" value="Vegetarian">
  <label class="form-check-label" for="veg">Vegetarian</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="nutFree" value="Nut-free">
  <label class="form-check-label" for="nutFree">Nut-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="vegan" value="Vegan">
  <label class="form-check-label" for="vegan">Vegan</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="glutenFree" value="Gluten-free">
  <label class="form-check-label" for="glutenFree">Gluten-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="peanutFree" value="Peanut-free">
  <label class="form-check-label" for="peanutFree">Peanut-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" name="dietary" id="dairyAlt" value="Dairy Alternative">
  <label class="form-check-label" for="dairyAlt">Alternative Dairy</label>
</div>


<!--File input-->
<div class="mb-3">
  <label for="formFile" class="form-label h5 p-2">Add an image</label>
  <input class="form-control" type="file" id="formFile" style="width:350px"> 
</div>
  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
  <button class="btn btn-success btn-lg me-md-2" type="submit">Submit Post</button>
  <button class="btn btn-success btn-lg" type="reset">Reset</button>
</div>
    </div>
    </div>
</form>

<!-- Thank You Modal -->
    <div class="modal fade" id="thankYouModal" tabindex="-1" aria-labelledby="thankYouLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header">
                    <h5 class="modal-title" id="thankYouLabel">Thank You!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Your post has been successfully submitted!🌟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

        <span class="material-icons">map</span>
      </div>
    </footer> -->
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/post.js"></script>
  </body>
</html>
