    <section class=" text-dark text-center p-5">
      <div class="container">
        <h1 class="display-4">Create Food Option</h1>
      </div>
    </section>
    <br />

    <form>
      <div class="row mb-3">
        <label for="inputFoodName" class="col-sm-2 col-form-label">Food Name</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" id="inputFoodName" placeholder="Food Name" />
        </div>
      </div>
      <div class="row mb-3">
        <label for="inputDescription" class="col-sm-2 col-form-label"
          >Description</label
        >
        <div class="col-sm-10">
            <textarea class="form-control" id="inputDescription" ></textarea>
        </div>
      </div>
      <fieldset class="row mb-3">
        <legend class="col-form-label col-sm-2 pt-0">Dietary Tags</legend>
        <div class="col-sm-10">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="gridRadios"
              id="gridRadios1"
              value="option1"
            />
            <label class="form-check-label" for="gridRadios1">
              Vegetarian
            </label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="gridRadios"
              id="gridRadios2"
              value="option2"
            />
            <label class="form-check-label" for="gridRadios2">
              Vegan
            </label>
          </div>
          <div class="form-check disabled">
            <input
              class="form-check-input"
              type="checkbox"
              name="gridRadios"
              id="gridRadios3"
              value="option3"
            />
            <label class="form-check-label" for="gridRadios3">
              Alternative Dairy
            </label>
          </div>
        </div>
      </fieldset>
      <div class="row mb-3">
        <div class="col-sm-10 offset-sm-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="gridCheck1" />
            <label class="form-check-label" for="gridCheck1">
              Gluten-free
            </label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Next</button>
    </form>

    <footer class="navbar bg-info fixed-bottom footer">
      <div class="container py-3 d-flex justify-content-around">
        <span class="material-icons">favorite</span>
        <span class="material-icons">home</span>
        <span class="material-icons">map</span>
      </div>
    </footer>
    <script type="module" src="./src/main.js"></script>
