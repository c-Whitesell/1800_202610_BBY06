<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="./src/styles/style.css" /> -->
<link rel="stylesheet" href="https://unpkg.com/@geoapify/geocoder-autocomplete@^1/styles/minimal.css">

    <title>Food Post · Thoughtful Food</title>

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>

    

  </head>

  <body>

    <site-navbar></site-navbar>

    <section class="text-dark text-center p-2">
      <div class="container">
        <h1 class="display-5 text-body-emphasis herotext">Create Post</h1>
      </div>
    </section>
    <br />

<form id="postForm" class="p-3">

<div class="d-flex justify-content-center align-items-center">  
    <div style="width: 800px;">
      <div class="form-floating mb-3">
  <input type="text" class="form-control" id="title" placeholder="Food Name">
  <label for="title">Food Name</label>
</div>

<div class="form-floating mb-3">
  <input type="number" id="price" class="form-control" placeholder="Price" step="0.01"/>
  <label for="price">Price</label>
</div>

<div class="form-floating mb-3">
  <input type="text" class="form-control" id="restaurant" placeholder="Restaurant Name">
  <label for="restaurant">Restaurant Name</label>
</div>

<div id="autocomplete" class="autocomplete-container form-floating mb-3">
    
</div>

<div class="form-floating mb-3">
  <textarea class="form-control" placeholder="Description here" id="description" style="height: 100px"></textarea>
  <label for="description">Description</label>
</div>

<div class="form-floating">
  <p class="h5">Dietary Tags</p>

<div class="d-flex flex-wrap gap-2">
  
  <input type="checkbox" class="btn-check" id="veg" name="dietary" value="Vegetarian" autocomplete="off">
  <label class="btn bg-info" for="veg">Vegetarian</label>

  <input type="checkbox" class="btn-check" id="nutFree" name="dietary" value="Nut-free" autocomplete="off">
  <label class="btn bg-info" for="nutFree">Nut-free</label>

  <input type="checkbox" class="btn-check" id="vegan" name="dietary" value="Vegan" autocomplete="off">
  <label class="btn bg-info" for="vegan">Vegan</label>

  <input type="checkbox" class="btn-check" id="glutenFree" name="dietary" value="Almost Gluten-free" autocomplete="off">
  <label class="btn bg-info" for="glutenFree">Almost Gluten-free</label>

  <input type="checkbox" class="btn-check" id="cilantro" name="dietary" value="Cilantro" autocomplete="off">
  <label class="btn bg-info" for="cilantro">Cilantro</label>

  <input type="checkbox" class="btn-check" id="peanutFree" name="dietary" value="Peanut-free" autocomplete="off">
  <label class="btn bg-info" for="peanutFree">Peanut-free</label>

  <input type="checkbox" class="btn-check" id="porkFree" name="dietary" value="Pork Free" autocomplete="off">
  <label class="btn bg-info" for="porkFree">Pork-Free</label>

  <input type="checkbox" class="btn-check" id="dairyAlt" name="dietary" value="Dairy Alternative" autocomplete="off">
  <label class="btn bg-info" for="dairyAlt">Alternative Dairy</label>

  <input type="checkbox" class="btn-check" id="halal" name="dietary" value="Halal" autocomplete="off">
  <label class="btn bg-info" for="halal">Halal</label>

</div>

<!--File input-->
<div class="container py-3">
  <input type="file" id="inputImage" accept="image/*" required />
  <img id="mypic-goes-here" width=100 height=100 />
</div>

  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
  <button class="btn bg-info me-md-2" type="submit">Submit Post</button>
  <button class="btn btn-secondary" type="reset">Reset</button>
</div>
    </div>
    </div>
</form>

<!-- Thank You Modal -->
    <div class="modal fade" id="thankYouModal" tabindex="-1" aria-labelledby="thankYouLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header">
                    <h5 class="modal-title" id="thankYouLabel">Thank You!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Your post has been successfully submitted!🌟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/post.js"></script>

    

  </body>
</html>
