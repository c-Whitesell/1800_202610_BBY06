<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="./src/styles/style.css" /> -->
    <title>Food Post</title>

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <section class="text-dark text-center p-5">
      <div class="container">
        <h1 class="display-4 fw-bold text-body-emphasis">Create Food Option</h1>
      </div>
    </section>
    <br />
<form>
<div class="d-flex justify-content-center align-items-center">
    <div style="width: 800px;">
      <div class="form-floating mb-3">
  <input type="text" class="form-control" id="floatingInput" placeholder="Food Name">
  <label for="floatingInput">Food Name</label>
</div>
<div class="form-floating mb-3">
  <input type="number" id="Price" class="form-control" placeholder="Price"/>
  <label for="Price">Price</label>
</div>
<div class="form-floating mb-3">
  <textarea class="form-control" placeholder="Description here" id="floatingTextarea2Disabled" style="height: 100px"></textarea>
  <label for="floatingTextarea2Disabled">Description</label>
</div>
<div class="form-floating">
  <div class="p-2">Dietary Tags</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
  <label class="form-check-label" for="inlineCheckbox1">Vegetarian</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
  <label class="form-check-label" for="inlineCheckbox2">Nut-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
  <label class="form-check-label" for="inlineCheckbox3">Vegan</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox4" value="option3">
  <label class="form-check-label" for="inlineCheckbox3">Gluten-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox5" value="option3">
  <label class="form-check-label" for="inlineCheckbox3">Peanut-free</label>
</div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="checkbox" id="inlineCheckbox6" value="option3">
  <label class="form-check-label" for="inlineCheckbox3">Alternative Dairy</label>
</div>


<!--File input-->
<div class="mb-3">
  <label for="formFile" class="form-label p-2">Add an image</label>
  <input class="form-control" type="file" id="formFile" style="width:350px"> 
</div>
    </div>

<button id="submit">Submit</button>
</div>
</form>



    <footer class="navbar bg-info fixed-bottom footer">
      <div class="container py-3 d-flex justify-content-around">
        <span class="material-icons">favorite</span>
        <span class="material-icons">home</span>
        <span class="material-icons">map</span>
      </div>
    </footer>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
