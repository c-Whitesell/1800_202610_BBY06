<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>Favorite</title>

    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <style>
      :root {
        --primary-color: #fff275;
        --secondary-color: #758e4f;
        --text-color: #4f1802;
      }

      /* Override favorite.js injected body styles so navbar sits full-width */
      body {
        background-color: var(--primary-color) !important;
        display: block !important;
        align-items: unset !important;
        padding: 0 !important;
      }

      /* Olive green navbar */
      .bg-info {
        background-color: var(--secondary-color) !important;
      }
      .navbar-brand {
        color: var(--text-color) !important;
      }

      /* Re-center the page content below the navbar */
      .fav-body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 80px;
      }

      .page-wrapper {
        background: #f5f5f5;
        border-radius: 16px;
        width: 100%;
        max-width: 960px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Shared navbar — full width, outside the centered wrapper -->
    <site-navbar></site-navbar>

    <!-- Centered page content -->
    <div class="fav-body">
      <div class="page-wrapper">
        <main class="main-content">
          <h1 class="section-title">FAVORITES</h1>
          <div class="product-grid" id="productGrid"></div>
          <button class="load-more" id="loadMoreBtn">LOAD MORE</button>
        </main>
      </div>

      <!-- FOOTER -->
      <footer class="site-footer">
        <a href="./favourite.html"
          ><span class="material-icons">favorite</span></a
        >
        <a href="./main.html"><span class="material-icons">home</span></a>
        <a href="./main.html"><span class="material-icons">map</span></a>
        <span class="footer-copy">&copy; 2026 Thoughtful Food</span>
      </footer>
    </div>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/favorite.js"></script>
  </body>
</html>
